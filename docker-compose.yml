version: '3.9'
services:
  postgres:
    image: postgres:16-alpine
    container_name: iputa-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: iputa
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: iputa-redis
    ports:
      - '6379:6379'

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: iputa-api
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/iputa
      JWT_SECRET: dev-secret
      JWT_EXPIRES_IN: 7d
      PORT: 3000
    ports:
      - '3000:3000'
    depends_on:
      - postgres
      - redis

volumes:
  pgdata:
