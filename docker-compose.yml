version: '3.9'
services:
  postgres:
    image: postgres:16-alpine
    container_name: iputa-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: iputa
    ports:
      - '5433:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: iputa-redis
    ports:
      - '6380:6380'

  # api:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile
  #   container_name: iputa-api
  #   environment:
  #     DATABASE_URL: postgresql://postgres:postgres@postgres:5433/iputa
